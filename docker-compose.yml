services:
  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zeropool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zeropool}
      POSTGRES_DB: ${POSTGRES_DB:-zeropool}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zeropool}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Redis Cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # FastAPI Backend
  # ===========================================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-zeropool}:${POSTGRES_PASSWORD:-zeropool}@db:5432/${POSTGRES_DB:-zeropool}
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - storage_data:/app/storage
      - ./fonts:/app/fonts:ro
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ===========================================================================
  # ARQ Worker (Background Tasks)
  # ===========================================================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-zeropool}:${POSTGRES_PASSWORD:-zeropool}@db:5432/${POSTGRES_DB:-zeropool}
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - storage_data:/app/storage
      - ./fonts:/app/fonts:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq app.worker.WorkerSettings

  # ===========================================================================
  # SvelteKit Frontend
  # ===========================================================================
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      - PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  storage_data:
